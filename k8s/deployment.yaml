apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuroops-api
  namespace: neuroops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neuroops-api
  template:
    metadata:
      labels:
        app: neuroops-api
    spec:
      containers:
        - name: neuroops-api
          image: neuroops:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5